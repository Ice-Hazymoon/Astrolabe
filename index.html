<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />

    <title>%SITE_NAME% — Identify Stars, Constellations & Deep-Sky Objects in Night-Sky Photos</title>
    <meta name="description" content="Upload a photo of the night sky and %SITE_NAME% identifies constellations, named stars, and deep-sky objects with astrometric plate solving. Free, fast, and privacy-friendly." />
    <meta name="keywords" content="star annotator, plate solving, astrometry, constellation finder, night sky identification, deep-sky objects, astrophotography tool, star identifier" />
    <meta name="author" content="%SITE_NAME%" />
    <meta name="generator" content="%SITE_NAME%" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="rating" content="general" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0e16" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Mobile app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="%SITE_NAME%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="%SITE_NAME%" />

    <!-- Open Graph (default — useSEO() updates these at runtime for the active locale) -->
    <meta property="og:site_name" content="%SITE_NAME%" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%SITE_NAME% — Identify Stars, Constellations & Deep-Sky Objects" />
    <meta property="og:description" content="Upload a photo of the night sky — %SITE_NAME% identifies constellations, named stars, and deep-sky objects." />
    <meta property="og:image" content="%SITE_URL%/og-cover.png" />
    <meta property="og:image:alt" content="A night-sky photograph with constellations and stars annotated by %SITE_NAME%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="%SITE_URL%/" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_NAME% — Star Annotator" />
    <meta name="twitter:description" content="Identify constellations, stars, and deep-sky objects in your night-sky photos." />
    <meta name="twitter:image" content="%SITE_URL%/og-cover.png" />
    <meta name="twitter:image:alt" content="A night-sky photograph with constellations and stars annotated by %SITE_NAME%" />

    <link rel="canonical" href="%SITE_URL%/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0b0e16" />
    <link rel="apple-touch-icon" href="/icon-maskable.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap"
    />

    <!-- JSON-LD is also refreshed per-locale by useSEO(); this copy is the static
         fallback shown to crawlers that render before JS executes. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "%SITE_NAME%",
          "description": "Upload a photo of the night sky and %SITE_NAME% identifies constellations, named stars, and deep-sky objects with astrometric plate solving.",
          "applicationCategory": "MultimediaApplication",
          "applicationSubCategory": "Astrophotography",
          "operatingSystem": "Web",
          "url": "%SITE_URL%/",
          "image": "%SITE_URL%/og-cover.png",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "featureList": [
            "Astrometric plate solving",
            "Constellation identification",
            "Named-star identification",
            "Deep-sky object catalog",
            "Multi-language labels",
            "Privacy-friendly: images are not permanently stored"
          ]
        },
        {
          "@type": "WebSite",
          "name": "%SITE_NAME%",
          "url": "%SITE_URL%/",
          "inLanguage": "en"
        }
      ]
    }
    </script>

    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: #0b0e16;
        overscroll-behavior: none;
      }
      body {
        font-family: 'Manrope', 'Noto Sans SC', system-ui, sans-serif;
        color-scheme: dark;
      }
      #root-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.4);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <noscript>
      <div style="padding:32px;max-width:640px;margin:auto;font-family:sans-serif;color:#e0e1e6;">
        <h1>%SITE_NAME% — Star Annotator</h1>
        <p>
          %SITE_NAME% is a free web app that identifies constellations, named stars,
          and deep-sky objects in photos of the night sky. It uses astrometric
          plate solving to solve the image and labels the result in your language
          of choice. JavaScript is required to run the analyzer.
        </p>
        <p>
          <strong>Features:</strong> plate solving, constellation lines and
          labels, named-star identification, Messier / NGC / IC deep-sky
          catalog, and localized labels.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
